<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About | Sachin</title>
  <style>
    :root {
      --ink: #172033;
      --paper: rgba(255, 255, 255, 0.78);
      --accent: #0f766e;
      --sun: #f8d57e;
      --rose: #f5a3a8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(rgba(255, 247, 229, 0.24), rgba(12, 20, 34, 0.48)),
        url("https://source.unsplash.com/lYp_dhLmOCQ/1920x1080") center / cover no-repeat fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: rgba(255, 255, 255, 0.12);
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem clamp(1rem, 5vw, 4rem);
      border-bottom: 1px solid rgba(255, 255, 255, 0.72);
      background: rgba(255, 248, 231, 0.9);
      box-shadow: 0 12px 36px rgba(23, 32, 51, 0.12);
      backdrop-filter: blur(18px);
    }

    .brand {
      color: var(--accent);
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0;
      text-decoration: none;
    }

    main {
      width: min(88vw, 720px);
      margin-top: 5.5rem;
      padding: clamp(2rem, 7vw, 5rem);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: 0 28px 80px rgba(35, 48, 71, 0.18);
      backdrop-filter: blur(22px);
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    nav a {
      color: var(--ink);
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 750;
      padding: 0.62rem 0.9rem;
      border: 1px solid rgba(23, 32, 51, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.46);
    }

    nav a[aria-current="page"] {
      color: white;
      border-color: var(--accent);
      background: var(--accent);
    }

    .eyebrow {
      margin: 0 0 1rem;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 10vw, 6.5rem);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: 0;
    }

    p {
      max-width: 34rem;
      margin: 1.35rem auto 0;
      color: rgba(23, 32, 51, 0.72);
      font-size: clamp(1rem, 2.3vw, 1.2rem);
      line-height: 1.7;
    }

    @media (max-width: 520px) {
      header {
        justify-content: center;
        flex-direction: column;
      }

      main {
        margin-top: 9rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="index.html">Sachin</a>
    <nav aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="about.html" aria-current="page">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>
  <main>
    <p class="eyebrow">About this space</p>
    <h1>About Sachin</h1>
    <p>This little site is a warm starting point for sharing projects, ideas, and the story behind the work. It keeps things simple, personal, and easy to explore.</p>
  </main>
</body>
</html>
