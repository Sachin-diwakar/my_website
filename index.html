<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home | Sachin</title>
  <style>
    :root {
      --ink: #172033;
      --paper: rgba(255, 255, 255, 0.78);
      --accent: #0f766e;
      --sun: #f8d57e;
      --rose: #f5a3a8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: #f7efe1;
    }

    body::before {
      display: none;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem clamp(1rem, 5vw, 4rem);
      border-bottom: 1px solid rgba(255, 255, 255, 0.72);
      background: rgba(255, 248, 231, 0.9);
      box-shadow: 0 12px 36px rgba(23, 32, 51, 0.12);
      backdrop-filter: blur(18px);
    }

    .brand {
      color: var(--accent);
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0;
      text-decoration: none;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    nav a {
      color: var(--ink);
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 750;
      padding: 0.62rem 0.9rem;
      border: 1px solid rgba(23, 32, 51, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.46);
    }

    nav a[aria-current="page"] {
      color: white;
      border-color: var(--accent);
      background: var(--accent);
    }

    .hero {
      min-height: 100vh;
      display: grid;
      align-items: center;
      padding: 7.5rem clamp(1.25rem, 7vw, 6rem) 3rem;
      background:
        linear-gradient(90deg, rgba(10, 18, 31, 0.82) 0%, rgba(10, 18, 31, 0.42) 48%, rgba(10, 18, 31, 0.16) 100%),
        url("https://source.unsplash.com/lYp_dhLmOCQ/1920x1080") center / cover no-repeat;
    }

    .hero-content {
      width: min(92vw, 760px);
      color: white;
    }

    .eyebrow {
      margin: 0 0 1rem;
      color: var(--sun);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(3.5rem, 13vw, 8rem);
      line-height: 0.92;
      font-weight: 900;
      letter-spacing: 0;
      text-shadow: 0 16px 36px rgba(0, 0, 0, 0.32);
    }

    h2 {
      margin: 0;
      font-size: clamp(3.5rem, 13vw, 8rem);
      line-height: 0.92;
      font-weight: 900;
      letter-spacing: 0;
      color: var(--sun);
      text-shadow: 0 16px 36px rgba(0, 0, 0, 0.32);
    }

    p {
      max-width: 34rem;
      margin: 1.35rem 0 0;
      color: rgba(255, 255, 255, 0.84);
      font-size: clamp(1rem, 2.3vw, 1.2rem);
      line-height: 1.7;
    }

    @media (max-width: 520px) {
      header {
        justify-content: center;
        flex-direction: column;
      }

      .hero {
        padding-top: 10.5rem;
        text-align: center;
      }

      p {
        margin-left: auto;
        margin-right: auto;
      }
    }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="index.html">Sachin</a>
    <nav aria-label="Main navigation">
      <a href="index.html" aria-current="page">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>
  <main class="hero">
    <section class="hero-content" aria-label="Home hero">
      <p class="eyebrow">A warm view from the peak</p>
      <h1>Hello, from</h1>
      <h2>Sachin</h2>
      <p>Welcome to a simple personal website, set against a sunset mountain view and ready to grow with your ideas.</p>
    </section>
  </main>
</body>
</html>
