<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Contact | Sachin</title>
  <style>
    :root {
      --ink: #172033;
      --paper: rgba(255, 255, 255, 0.78);
      --accent: #0f766e;
      --sun: #f8d57e;
      --rose: #f5a3a8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 20%, rgba(248, 213, 126, 0.88), transparent 28rem),
        radial-gradient(circle at 88% 18%, rgba(245, 163, 168, 0.82), transparent 24rem),
        radial-gradient(circle at 70% 85%, rgba(15, 118, 110, 0.42), transparent 28rem),
        linear-gradient(135deg, #eef7f3 0%, #f9f3e8 45%, #e9f0ff 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(23, 32, 51, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(23, 32, 51, 0.045) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.7), transparent 80%);
    }

    main {
      width: min(88vw, 720px);
      padding: clamp(2rem, 7vw, 5rem);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: 0 28px 80px rgba(35, 48, 71, 0.18);
      backdrop-filter: blur(22px);
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    nav a {
      color: var(--ink);
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 750;
      padding: 0.62rem 0.9rem;
      border: 1px solid rgba(23, 32, 51, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.46);
    }

    nav a[aria-current="page"] {
      color: white;
      border-color: var(--accent);
      background: var(--accent);
    }

    .eyebrow {
      margin: 0 0 1rem;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 10vw, 6.5rem);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: 0;
    }

    p {
      max-width: 34rem;
      margin: 1.35rem auto 0;
      color: rgba(23, 32, 51, 0.72);
      font-size: clamp(1rem, 2.3vw, 1.2rem);
      line-height: 1.7;
    }

    .contact-link {
      display: inline-block;
      margin-top: 1.6rem;
      color: white;
      text-decoration: none;
      font-weight: 800;
      padding: 0.85rem 1.1rem;
      border-radius: 8px;
      background: var(--accent);
      box-shadow: 0 14px 32px rgba(15, 118, 110, 0.22);
    }
  </style>
</head>
<body>
  <main>
    <nav aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html" aria-current="page">Contact</a>
    </nav>
    <p class="eyebrow">Say hello</p>
    <h1>SD Web Solutions 
    </h1>
    <p>Have a project, question, or idea to share? Send a note and start the conversation.</p>
    <a class="contact-link" href="mailto:sachindiwakar01@gmail.com">sachindiwakar01@gmail.com</a>
  </main>
</body>
</html>
